<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PCCC KV8 Tactical Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>PCCC KV8 Tactical Dashboard</h1>
      <p>Realtime Tactical Monitoring System</p>
    </div>
    <div class="clock" id="clock"></div>
  </header>

  <section class="stats-grid">
    <div class="card glow">
      <h2>Tổng cơ sở</h2>
      <span id="totalFacilities">0</span>
    </div>

    <div class="card">
      <h2>Đã kiểm tra</h2>
      <span id="checkedFacilities">0</span>
    </div>

    <div class="card warning">
      <h2>Chưa kiểm tra</h2>
      <span id="uncheckedFacilities">0</span>
    </div>

    <div class="card danger">
      <h2>Nguy cơ cao</h2>
      <span id="highRiskFacilities">0</span>
    </div>
  </section>

  <section class="form-section">
    <h2>Nhập dữ liệu kiểm tra</h2>

    <form id="inspectionForm">
      <input type="text" id="facilityName" placeholder="Tên cơ sở" required />

      <select id="facilityType">
        <option>Nhà trọ</option>
        <option>Trường học</option>
        <option>Kho hàng</option>
        <option>Nhà xưởng</option>
        <option>Hộ kinh doanh</option>
      </select>

      <select id="riskLevel">
        <option value="low">Nguy cơ thấp</option>
        <option value="medium">Nguy cơ trung bình</option>
        <option value="high">Nguy cơ cao</option>
      </select>

      <select id="inspectionStatus">
        <option value="checked">Đã kiểm tra</option>
        <option value="unchecked">Chưa kiểm tra</option>
      </select>

      <button type="submit">Lưu dữ liệu</button>
    </form>
  </section>

  <section class="table-section">
    <div class="section-header">
      <h2>Dữ liệu hiện trường</h2>
      <button id="resetBtn">Reset ngày mới</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Cơ sở</th>
          <th>Loại hình</th>
          <th>Nguy cơ</th>
          <th>Trạng thái</th>
        </tr>
      </thead>
      <tbody id="facilityTable"></tbody>
    </table>
  </section>

  <section class="history-section">
    <h2>Lịch sử Snapshot Hàng Ngày</h2>
    <div id="historyContainer"></div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
